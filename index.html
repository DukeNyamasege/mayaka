<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaka Audio Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .engine-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 25px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            width: fit-content;
            background: #fff7ed;
            color: #b45309;
            border: 1px solid #fed7aa;
            transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
        }

        .engine-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 0 currentColor;
        }

        .engine-badge.is-loading .dot {
            animation: pulse 1.2s ease-in-out infinite;
        }

        .engine-badge.is-ready {
            background: #ecfdf5;
            color: #047857;
            border-color: #a7f3d0;
        }

        .engine-badge.is-fallback {
            background: #fff1f2;
            color: #be123c;
            border-color: #fecdd3;
        }

        .engine-badge.is-error {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0.5); }
            70%  { box-shadow: 0 0 0 8px rgba(180, 83, 9, 0); }
            100% { box-shadow: 0 0 0 0 rgba(180, 83, 9, 0); }
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8ebff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        
        .upload-text strong {
            color: #667eea;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f0f2ff;
            border-radius: 10px;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .file-size {
            color: #666;
            font-size: 14px;
        }
        
        .progress-section {
            display: none;
            margin-top: 25px;
        }
        
        .progress-section.show {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .buttons {
            display: none;
            gap: 12px;
            margin-top: 25px;
        }
        
        .buttons.show {
            display: flex;
        }
        
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f2ff;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background: #e0e4ff;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .status-message {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
            min-height: 20px;
        }
        
        .status-message.error {
            color: #ef4444;
        }
        
        .status-message.success {
            color: #10b981;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Mayaka Audio Extractor</h1>
        <p class="subtitle">Extract audio from any video file</p>

        <!-- Engine status -->
        <div class="engine-badge is-loading" id="engineBadge" role="status" aria-live="polite">
            <span class="dot"></span>
            <span class="label" id="engineBadgeLabel">Initializing engine…</span>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                <strong>Click to upload</strong> or drag and drop<br>
                <span style="font-size: 12px; color: #999;">Supported: MP4, AVI, MOV, MKV, WEBM</span>
            </div>
            <input type="file" id="fileInput" accept="video/*">
        </div>
        
        <!-- File Info -->
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName">video.mp4</div>
            <div class="file-size" id="fileSize">Size: 0 MB</div>
        </div>
        
        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Processing...</div>
        </div>
        
        <!-- Buttons -->
        <div class="buttons" id="buttons">
            <button class="btn btn-primary" id="extractBtn">🎵 Extract Audio</button>
            <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
        </div>
        
        <!-- Status -->
        <div class="status-message" id="statusMessage"></div>
    </div>

    <!-- Include FFmpeg.wasm (UMD build) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
        // Get DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const buttons = document.getElementById('buttons');
        const extractBtn = document.getElementById('extractBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');
        const engineBadge = document.getElementById('engineBadge');
        const engineBadgeLabel = document.getElementById('engineBadgeLabel');

        let selectedFile = null;
        let ffmpeg = null;
        let isProcessing = false;
        let ffmpegLoading = null;       // Singleton in-flight load promise
        let loadMode = 'preload';       // 'preload' = keep instance warm; 'on-demand' = load per run

        // ----- Engine status badge -----
        const ENGINE_STATES = {
            initializing: { cls: 'is-loading',  label: 'Initializing engine…' },
            loading:      { cls: 'is-loading',  label: 'Loading audio engine…' },
            ready:        { cls: 'is-ready',    label: '✓ Engine ready' },
            fallback:     { cls: 'is-fallback', label: '⚠ Load-on-demand mode (close other tabs)' },
            error:        { cls: 'is-error',    label: '✕ Engine unavailable' }
        };
        function setEngineState(state, customLabel) {
            const cfg = ENGINE_STATES[state];
            if (!cfg) return;
            engineBadge.className = 'engine-badge ' + cfg.cls;
            engineBadgeLabel.textContent = customLabel || cfg.label;
        }

        // ----- Environment checks -----
        function checkEnvironment() {
            if (location.protocol === 'file:') {
                return 'This page must be served from a web server (http:// or https://), not opened directly from disk (file://). FFmpeg.wasm cannot load from file:// URLs.';
            }
            if (typeof SharedArrayBuffer === 'undefined') {
                return 'SharedArrayBuffer is not available. The page must be served with cross-origin isolation headers (COOP: same-origin and COEP: require-corp).';
            }
            if (typeof FFmpeg === 'undefined') {
                return 'FFmpeg library failed to load from the CDN. Check your internet connection or ad-blocker.';
            }
            return null;
        }

        // ----- Tear down any existing FFmpeg instance and free its WebAssembly memory -----
        function disposeFFmpeg() {
            if (ffmpeg) {
                try {
                    if (ffmpeg.isLoaded && ffmpeg.isLoaded() && typeof ffmpeg.exit === 'function') {
                        ffmpeg.exit();
                    }
                } catch (e) { /* ignore */ }
            }
            ffmpeg = null;
        }

        function isMemoryError(error) {
            const msg = (error && (error.message || error.toString())) || '';
            return /allocate memory|out of memory|WebAssembly\.Memory|RangeError/i.test(msg);
        }

        function idle(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ----- Singleton FFmpeg loader -----
        // Returns true on success, false on failure. Safe to call concurrently:
        // all callers await the same in-flight promise.
        async function ensureFFmpeg() {
            if (ffmpeg && ffmpeg.isLoaded && ffmpeg.isLoaded()) return true;
            if (ffmpegLoading) return ffmpegLoading;

            ffmpegLoading = (async () => {
                const envError = checkEnvironment();
                if (envError) {
                    setEngineState('error', '✕ ' + envError);
                    statusMessage.textContent = '❌ ' + envError;
                    statusMessage.className = 'status-message error';
                    return false;
                }

                const { createFFmpeg } = FFmpeg;
                const attempt = async () => {
                    disposeFFmpeg();
                    ffmpeg = createFFmpeg({
                        log: true,
                        // Explicit corePath avoids the default loader's CDN guess that often 404s
                        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
                        progress: ({ ratio }) => {
                            if (typeof ratio !== 'number' || isNaN(ratio)) return;
                            const percent = Math.max(0, Math.min(100, Math.round(ratio * 100)));
                            progressFill.style.width = percent + '%';
                            progressText.textContent = `Processing: ${percent}%`;
                        }
                    });
                    await ffmpeg.load();
                };

                try {
                    setEngineState('loading');
                    try {
                        await attempt();
                    } catch (firstError) {
                        if (!isMemoryError(firstError)) throw firstError;
                        console.warn('FFmpeg memory allocation failed, retrying once...', firstError);
                        setEngineState('loading', 'Memory pressure — retrying…');
                        disposeFFmpeg();
                        await idle(1500);
                        await attempt();
                    }
                    setEngineState('ready');
                    return true;
                } catch (error) {
                    console.error('FFmpeg load error:', error);
                    disposeFFmpeg();
                    if (isMemoryError(error)) {
                        // Graceful fallback: switch to load-on-demand for future attempts
                        loadMode = 'on-demand';
                        setEngineState('fallback');
                        statusMessage.textContent = '⚠ Not enough memory to preload. Close inactive browser tabs and the engine will load when you click Extract.';
                        statusMessage.className = 'status-message error';
                    } else {
                        setEngineState('error');
                        statusMessage.textContent = '❌ Failed to load FFmpeg: ' + (error && error.message ? error.message : error);
                        statusMessage.className = 'status-message error';
                    }
                    return false;
                } finally {
                    ffmpegLoading = null;
                }
            })();

            return ffmpegLoading;
        }

        // ----- Service Worker registration (caches the ~25 MB FFmpeg core) -----
        function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) return Promise.resolve(null);
            return navigator.serviceWorker.register('sw.js').catch((err) => {
                console.warn('Service worker registration failed:', err);
                return null;
            });
        }
        
        // Handle file selection
        function handleFile(file) {
            if (!file) return;
            
            // Check if it's a video file
            if (!file.type.startsWith('video/')) {
                statusMessage.textContent = '❌ Please select a video file.';
                statusMessage.className = 'status-message error';
                return;
            }
            
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = `Size: ${(file.size / (1024 * 1024)).toFixed(2)} MB`;
            fileInfo.classList.add('show');
            buttons.classList.add('show');
            statusMessage.textContent = '';
            statusMessage.className = 'status-message';
            
            // Hide progress
            progressSection.classList.remove('show');
        }
        
        // Upload area click
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        // Clear button
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            buttons.classList.remove('show');
            progressSection.classList.remove('show');
            statusMessage.textContent = '';
            statusMessage.className = 'status-message';
            progressFill.style.width = '0%';
            isProcessing = false;
            extractBtn.disabled = false;
        });
        
        // Extract Audio button
        extractBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                statusMessage.textContent = '❌ Please select a video file first.';
                statusMessage.className = 'status-message error';
                return;
            }
            
            if (isProcessing) return;
            
            // Initialize FFmpeg if not already (uses singleton)
            if (!ffmpeg || !ffmpeg.isLoaded || !ffmpeg.isLoaded()) {
                const loaded = await ensureFFmpeg();
                if (!loaded) return;
            }

            isProcessing = true;
            extractBtn.disabled = true;
            progressSection.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = 'Starting extraction...';
            statusMessage.textContent = '';
            statusMessage.className = 'status-message';

            try {
                const { fetchFile } = FFmpeg;
                const inputName = 'input' + getFileExtension(selectedFile.name);
                const outputName = 'output.mp3';
                
                // Write file to FFmpeg
                progressText.textContent = 'Loading video file...';
                ffmpeg.FS('writeFile', inputName, await fetchFile(selectedFile));
                
                // Extract audio
                progressText.textContent = 'Extracting audio...';
                await ffmpeg.run(
                    '-i', inputName,
                    '-vn',           // No video
                    '-acodec', 'libmp3lame',  // MP3 codec
                    '-ab', '192k',    // Bitrate
                    '-ar', '44100',   // Sample rate
                    '-y',            // Overwrite output
                    outputName
                );
                
                // Read output file
                const data = ffmpeg.FS('readFile', outputName);
                
                // Create download
                const blob = new Blob([data.buffer], { type: 'audio/mpeg' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace(/\.[^/.]+$/, '') + '.mp3';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                // Clean up
                try { ffmpeg.FS('unlink', inputName); } catch (e) { /* ignore */ }
                try { ffmpeg.FS('unlink', outputName); } catch (e) { /* ignore */ }
                
                progressFill.style.width = '100%';
                progressText.textContent = '✅ Extraction complete!';
                statusMessage.textContent = '✅ Download started!';
                statusMessage.className = 'status-message success';

            } catch (error) {
                console.error('Extraction error:', error);
                if (isMemoryError(error)) {
                    statusMessage.textContent = '❌ Ran out of memory while extracting. Try a shorter/smaller video, or close other browser tabs and try again.';
                } else {
                    statusMessage.textContent = '❌ Error extracting audio: ' + (error && error.message ? error.message : error);
                }
                statusMessage.className = 'status-message error';
                progressText.textContent = '❌ Extraction failed';
            } finally {
                // In on-demand mode, dispose between runs to recover memory.
                // In preload mode, keep the warm instance for instant subsequent extractions.
                if (loadMode === 'on-demand') {
                    disposeFFmpeg();
                } else {
                    setEngineState('ready');
                }
                isProcessing = false;
                extractBtn.disabled = false;
            }
        });

        // Helper function to get file extension
        function getFileExtension(filename) {
            const ext = filename.split('.').pop();
            return ext ? '.' + ext : '';
        }

        // ----- Page load: register service worker, then preload FFmpeg in background -----
        window.addEventListener('load', async () => {
            const envError = checkEnvironment();
            if (envError) {
                setEngineState('error', '✕ ' + envError);
                statusMessage.textContent = '❌ ' + envError;
                statusMessage.className = 'status-message error';
                return;
            }

            setEngineState('initializing');

            // Register the service worker first so the FFmpeg fetches can hit the cache.
            // We don't block on its activation — preload starts right after registration.
            await registerServiceWorker();

            // Kick off background preload. ensureFFmpeg() is a singleton so a later
            // Extract click will just await the same promise — no double-loading.
            ensureFFmpeg();
        });

        // Free FFmpeg memory if the user navigates away
        window.addEventListener('beforeunload', () => {
            disposeFFmpeg();
        });
    </script>
</body>
</html>
